# Prometheus configuration for Lab 4

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "mlops-api-blue"
    static_configs:
      - targets: ["api-blue:5000"]
    metrics_path: "/metrics"

  - job_name: "mlops-api-green"
    static_configs:
      - targets: ["api-green:5001"]
    metrics_path: "/metrics"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
